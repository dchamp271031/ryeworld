<svg xmlns="http://www.w3.org/2000/svg" viewBox="-200 -150 400 330" fill="none">
  <!-- RYEWORLD Logo — Primary (Black on Transparent) -->
  
  <!-- Stretched globe -->
  <ellipse cx="0" cy="0" rx="180" ry="130" stroke="#000" stroke-width="5" fill="none"/>
  
  <!-- Latitude lines -->
  <ellipse cx="0" cy="-78" rx="148" ry="14" stroke="#000" stroke-width="2.5" fill="none"/>
  <ellipse cx="0" cy="-40" rx="168" ry="18" stroke="#000" stroke-width="2" fill="none"/>
  <ellipse cx="0" cy="0" rx="180" ry="22" stroke="#000" stroke-width="2.5" fill="none"/>
  <ellipse cx="0" cy="40" rx="168" ry="18" stroke="#000" stroke-width="2" fill="none"/>
  <ellipse cx="0" cy="78" rx="148" ry="14" stroke="#000" stroke-width="2.5" fill="none"/>
  
  <!-- Longitude lines -->
  <ellipse cx="0" cy="0" rx="40" ry="130" stroke="#000" stroke-width="2.5" fill="none"/>
  <ellipse cx="0" cy="0" rx="90" ry="130" stroke="#000" stroke-width="2.5" fill="none"/>
  <ellipse cx="0" cy="0" rx="140" ry="130" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="0" y1="-130" x2="0" y2="130" stroke="#000" stroke-width="2.5"/>
  
  <!-- Text knockout band -->
  <rect x="-108" y="-30" width="216" height="60" rx="2" fill="#000"/>
  
  <!-- RYE text -->
  <text x="-8" y="0" text-anchor="middle" dominant-baseline="central" font-family="'Impact', 'Arial Narrow', sans-serif" font-size="58" fill="#fff" letter-spacing="16">RYE</text>

  <!-- WORLD below -->
  <text x="0" y="172" text-anchor="middle" font-family="'Impact', 'Arial Narrow', sans-serif" font-size="24" fill="#000" letter-spacing="20">WORLD</text>
  <text x="80" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000">★</text>
</svg>
