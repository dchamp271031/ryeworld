<svg xmlns="http://www.w3.org/2000/svg" viewBox="-210 -160 420 360" fill="none">
  <!-- RYEWORLD Logo — Dark Mode -->
  
  <rect x="-210" y="-160" width="420" height="360" rx="0" fill="#111"/>
  
  <!-- Stretched globe — white, slightly transparent -->
  <ellipse cx="0" cy="0" rx="150" ry="108" stroke="#fff" stroke-width="4.5" fill="none"/>
  
  <!-- Latitude lines -->
  <ellipse cx="0" cy="-65" rx="124" ry="12" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="-33" rx="140" ry="15" stroke="#fff" stroke-width="1.8" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="0" rx="150" ry="18" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="33" rx="140" ry="15" stroke="#fff" stroke-width="1.8" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="65" rx="124" ry="12" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Longitude lines -->
  <ellipse cx="0" cy="0" rx="34" ry="108" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="0" rx="75" ry="108" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="0" cy="0" rx="116" ry="108" stroke="#fff" stroke-width="1.8" fill="none" opacity="0.5"/>
  <line x1="0" y1="-108" x2="0" y2="108" stroke="#fff" stroke-width="2" opacity="0.5"/>
  
  <!-- Text knockout band — red -->
  <rect x="-90" y="-25" width="180" height="50" rx="2" fill="#E8222A"/>
  
  <!-- RYE text in white -->
  <text x="-7" y="0" text-anchor="middle" dominant-baseline="central" font-family="'Impact', 'Arial Narrow', sans-serif" font-size="48" fill="#fff" letter-spacing="14">RYE</text>

  <!-- WORLD below in red -->
  <text x="0" y="145" text-anchor="middle" font-family="'Impact', 'Arial Narrow', sans-serif" font-size="20" fill="#E8222A" letter-spacing="18">WORLD</text>
  <text x="66" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E8222A">★</text>
</svg>
